<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23b0b0b0'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%23000' font-size='18'%3ED%3C/text%3E%3C/svg%3E">
    <title>Discord Cloner Pro · XOLIRX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg-primary:#0b0b0b;--bg-secondary:rgba(22,22,22,0.96);--text-primary:#e8e8e8;--text-secondary:#8e8e8e;--accent:#b0b0b0;--accent-glow:rgba(160,160,160,0.2);--border:rgba(255,255,255,0.07);--error:#ff7b7b;--warning:#e6b450;--success:#7fe07f;--fix-bg:rgba(120,120,120,0.06);--card-shadow:0 8px 20px rgba(0,0,0,0.3)}
        body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
        .hidden{display:none!important}
        .navbar{position:fixed;top:0;width:100%;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;z-index:100;background:rgba(11,11,11,0.75);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
        .logo{font-size:0.85rem;font-weight:500;letter-spacing:2px;background:linear-gradient(135deg,#e8e8e8,#b0b0b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .nav-links{display:flex;gap:1.5rem}
        .nav-link{color:#8e8e8e;font-size:0.7rem;font-weight:500;cursor:pointer;transition:all 0.2s;padding:0.4rem 0}
        .nav-link.active{color:#e8e8e8;border-bottom:2px solid #b0b0b0}
        .main-container{max-width:1280px;margin:80px auto 2rem;padding:0 1rem;width:100%}
        .glass-card{background:rgba(22,22,22,0.96);border:1px solid rgba(255,255,255,0.07);border-radius:28px;padding:2rem;box-shadow:0 8px 20px rgba(0,0,0,0.3)}
        .auth-title{font-size:1.5rem;font-weight:700;text-align:center;background:linear-gradient(135deg,#e8e8e8,#b0b0b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .form-group{margin-bottom:1.2rem}
        .form-label{display:block;color:#b0b0b0;font-size:0.7rem;margin-bottom:0.5rem;text-transform:uppercase}
        .form-input,.clone-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:0.9rem;color:#e8e8e8;font-family:'JetBrains Mono',monospace}
        .btn{background:transparent;border:1px solid rgba(255,255,255,0.07);color:#e8e8e8;padding:0.65rem 1.2rem;border-radius:40px;font-size:0.75rem;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.5rem}
        .btn:hover{border-color:#b0b0b0;background:rgba(160,160,160,0.2)}
        .btn-primary{background:rgba(120,120,120,0.12);border-color:#b0b0b0}
        .btn-danger{background:rgba(255,100,100,0.05);border-color:rgba(255,100,100,0.25);color:#ff9f9f}
        .user-profile{background:rgba(22,22,22,0.96);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:1rem;margin-bottom:2rem;display:flex;align-items:center;gap:1rem}
        .avatar{width:52px;height:52px;border-radius:50%;border:2px solid #b0b0b0}
        .user-name{font-size:1.1rem;font-weight:600}
        .clone-card{background:rgba(22,22,22,0.96);border-radius:28px;padding:1.8rem;margin-bottom:1.8rem}
        .log-container{background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:1rem;height:280px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:0.7rem}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;visibility:hidden}
        .modal.active{opacity:1;visibility:visible}
        .modal-content{background:rgba(22,22,22,0.96);border:1px solid rgba(160,160,160,0.2);border-radius:32px;padding:2rem;max-width:550px;width:90%}
        .progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.07);border-radius:4px;margin:1rem 0}
        .progress-fill{height:100%;background:#b0b0b0;width:0%;transition:width 0.3s}
        .spinner{width:16px;height:16px;border:2px solid #b0b0b0;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
        .toast{position:fixed;top:20px;right:20px;background:#0b0b0b;color:#e8e8e8;padding:12px 20px;border-radius:16px;z-index:11000;font-size:0.8rem;border:1px solid #b0b0b0}
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import './src/main.js';
    </script>
</body>
</html>
